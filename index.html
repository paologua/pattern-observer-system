<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pattern Observer System</title>

<style>
  body { font-family:-apple-system,system-ui; background:#0b0b0b; color:#eee; margin:0; padding:12px; }
  h1 { font-size:20px; margin:4px 0 8px; }
  h2 { font-size:15px; margin:16px 0 6px; border-top:1px solid #333; padding-top:6px; }
  label { font-size:12px; display:block; margin-bottom:2px; }
  input, select, textarea {
    width:100%; padding:8px; background:#181818; border:1px solid #333; border-radius:6px; color:#eee;
    font-size:13px; margin-bottom:6px;
  }
  .signals-group-title { font-size:13px; font-weight:600; margin:10px 0 4px; color:#ccc; }
  .signal-block { margin-bottom:10px; }
  .signal-label { font-size:13px; margin-bottom:4px; }
  .btn-row { display:flex; gap:4px; }
  .btn {
    flex:1; padding:6px 4px; background:#1f1f1f; border:1px solid #333;
    border-radius:6px; font-size:11px; text-align:center; line-height:1.25;
  }
  .btn span.num { display:block; font-weight:600; margin-bottom:2px; }
  .btn span.desc { display:block; opacity:0.9; }
  .btn.active { background:#0d6efd; border-color:#0d6efd; color:#fff; }
  .actions { margin-top:10px; display:flex; gap:6px; }
  .actions button {
    flex:1; padding:10px; border:none; border-radius:6px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  .primary { background:#0d6efd; color:#fff; }
  .secondary { background:#222; color:#eee; }
  .results-box {
    background:#111; border:1px solid #333; border-radius:6px;
    padding:8px; font-size:12px;
  }
  #output { height:180px; font-family:Menlo,monospace; color:#0f0; }
</style>
</head>
<body>

<h1>Pattern Observer System</h1>

<div class="meta">
  <h2>Meta</h2>
  <label>ID sessione</label>
  <input id="sessionId">
  <label>ID persona</label>
  <input id="personId">
  <label>Contesto</label>
  <select id="context">
    <option value="">Seleziona</option>
    <option>Formale</option>
    <option>Informale</option>
    <option>Negoziale</option>
    <option>Conflittuale</option>
    <option>Intimo</option>
  </select>
  <label>Timestamp</label>
  <input id="timestamp" type="datetime-local">
  <label>Nota</label>
  <textarea id="note"></textarea>
</div>

<h2>Segnali NV / PV / V</h2>
<div id="signals"></div>

<h2>Risultati rapidi</h2>
<div class="results-box">
  <div>NV: <span id="nvCount">0</span></div>
  <div>PV: <span id="pvCount">0</span></div>
  <div>V: <span id="vCount">0</span></div>
  <div>Deviazioni: <span id="totalDev">0</span></div>
  <div>Intensità: <span id="rawIntensity">0</span></div>
</div>

<h2>Export JSON</h2>
<div class="actions">
  <button class="secondary" id="resetBtn">Reset</button>
  <button class="primary" id="exportBtn">Esporta</button>
</div>
<textarea id="output" readonly></textarea>

<script>
/* -------------------- CARICAMENTO FILE -------------------- */

let SIGNALS = null;
let SCALES = null;

async function loadData() {
  const s1 = await fetch("./data/signals.json").then(r => r.json());
  const s2 = await fetch("./data/scales.json").then(r => r.json());
  SIGNALS = s1;
  SCALES = s2;
  buildUI();
}

document.addEventListener("DOMContentLoaded", loadData);


/* -------------------- UI -------------------- */

function buildUI() {
  createGroup("Non verbale (NV)", "NV");
  createGroup("Paraverbale (PV)", "PV");
  createGroup("Verbale (V)", "V");
}

function createGroup(title, key) {
  const container = document.getElementById("signals");
  const t = document.createElement("div");
  t.className = "signals-group-title";
  t.textContent = title;
  container.appendChild(t);

  SIGNALS[key].forEach(([id, name]) => {
    const block = document.createElement("div");
    block.className = "signal-block";
    block.dataset.signalId = id;
    block.dataset.channel = key;

    const label = document.createElement("div");
    label.className = "signal-label";
    label.textContent = id + " — " + name;
    block.appendChild(label);

    const row = document.createElement("div");
    row.className = "btn-row";

    for (let v = 0; v <= 3; v++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "btn";
      btn.dataset.value = v;

      btn.innerHTML = `<span class="num">${v}</span><span class="desc">${SCALES[id][v]}</span>`;

      btn.onclick = () => {
        row.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        updateQuickResults();
      };

      row.appendChild(btn);
    }

    block.appendChild(row);
    container.appendChild(block);
  });
}

/* -------------------- ANALISI -------------------- */

function computeDeviations(signals) {
  let NV=0, PV=0, V=0, sum=0, count=0;
  for (const id in signals) {
    const val = signals[id].value;
    if (val === null || val === 0) continue;
    sum += val; count++;
    if (SIGNALS.NV.find(s => s[0] === id)) NV++;
    else if (SIGNALS.PV.find(s => s[0] === id)) PV++;
    else V++;
  }
  return { NV, PV, V, total:count, deviationScore: count? sum/(count*3):0 };
}

function computeCongruence(dev) {
  const {NV,PV,V} = dev;
  let cross="congruente";
  if (NV>PV && PV>V) cross="coerente";
  if (NV>0 && V>0 && NV!==V) cross="dissonanza NV–V";
  if (PV>0 && V>0 && PV!==V) cross="controllo narrativo";
  if (NV>0 && PV>0 && V>0 && (NV!==PV && PV!==V)) cross="conflitto interno";
  return { cross };
}

function computeIntensity(dev) {
  return Math.round(dev.deviationScore * 100);
}

function detectPattern(dev, congr) {
  const {NV,PV,V} = dev;
  const c = congr.cross;
  if (NV>=6 && c==="conflitto interno") return "Conflitto interno";
  if (NV>=5 && PV>=2) return "Stress cognitivo";
  if (NV>=4 && c==="dissonanza NV–V") return "Inganno";
  if (PV>=3 && V>=2) return "Controllo narrativo";
  if (NV>=3 && PV===0 && V===0) return "Micro-ritiro";
  if (NV>=4 && PV>=1 && V>=1) return "Ansia sociale";
  if (NV<=1 && PV<=1 && V<=1) return "Baseline stabile";
  return "Pattern non determinato";
}

function computeDirection(dev, intensity) {
  if (intensity>=70 && dev.NV>=5) return "Fuga";
  if (intensity>=60 && dev.PV>=3) return "Controllo";
  if (intensity<=30 && dev.V<=1) return "Apertura";
  if (dev.NV>=3 && dev.V>=2) return "Approccio";
  return "Neutra";
}

function runFullAnalysis(signals) {
  const dev = computeDeviations(signals);
  const congr = computeCongruence(dev);
  const intensity = computeIntensity(dev);
  const pattern = detectPattern(dev, congr);
  const direction = computeDirection(dev, intensity);
  return { deviations:dev, congruence:congr, intensity, pattern, direction };
}

/* -------------------- EXPORT -------------------- */

function updateQuickResults() {
  let NV=0,PV=0,V=0,dev=0;
  document.querySelectorAll(".signal-block").forEach(b=>{
    const a=b.querySelector(".btn.active");
    if (!a) return;
    const val=Number(a.dataset.value);
    if (val>0) dev++;
    if (b.dataset.channel==="NV") NV+=val>0?1:0;
    if (b.dataset.channel==="PV") PV+=val>0?1:0;
    if (b.dataset.channel==="V") V+=val>0?1:0;
  });
  document.getElementById("nvCount").textContent=NV;
  document.getElementById("pvCount").textContent=PV;
  document.getElementById("vCount").textContent=V;
  document.getElementById("totalDev").textContent=dev;
  document.getElementById("rawIntensity").textContent=Math.round((dev/30)*100);
}

function exportJSON() {
  const data={ meta:{}, signals:{}, analysis:{} };
  data.meta.sessionId=document.getElementById("sessionId").value||null;
  data.meta.personId=document.getElementById("personId").value||null;
  data.meta.context=document.getElementById("context").value||null;
  data.meta.timestamp=document.getElementById("timestamp").value||new Date().toISOString();
  data.meta.note=document.getElementById("note").value||null;

  document.querySelectorAll(".signal-block").forEach(b=>{
    const id=b.dataset.signalId;
    const a=b.querySelector(".btn.active");
    if (!a) data.signals[id]={value:null,description:null};
    else {
      const v=Number(a.dataset.value);
      data.signals[id]={value:v,description:SCALES[id][v]};
    }
  });

  data.analysis.full = runFullAnalysis(data.signals);
  document.getElementById("output").value = JSON.stringify(data,null,2);
}

function resetAll() {
  document.querySelectorAll(".btn.active").forEach(b=>b.classList.remove("active"));
  ["sessionId","personId","context","timestamp","note"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("output").value="";
  updateQuickResults();
}

document.getElementById("exportBtn").onclick=exportJSON;
document.getElementById("resetBtn").onclick=resetAll;
</script>

</body>
</html>
